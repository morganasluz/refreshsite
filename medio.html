<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refresh - Um passo de cada vez</title>
    <link rel="stylesheet" href="humores.css">
</head>
<body>

    <section class="tela-conteudo tom-neutro">
        <!-- Barra Superior -->
        <header class="barra-superior superior-neutro">
            <span class="app-titulo">Refresh</span>
            <a href="index.html" class="btn-icone-voltar">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 14 4 9l5-5"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
            </a>
        </header>

        <!-- Conteúdo Principal -->
        <div class="container-feliz">
            <h1 class="titulo-feliz">Tudo bem não estar 100% hoje...</h1>
            <p class="subtitulo-feliz">Que tal fazer algo bem leve para dar um respiro na rotina? Escolha uma das opções abaixo:</p>

            <div class="grade-opcoes">
                <!-- Opção 1: Mensagem Conforto -->
                <div class="card-opcao" id="card-conforto">
                   <a href="conforto.html" class="card-opcao link-direto">
                    <span class="rotulo-opcao">Ler um recado acolhedor</span>
                    <div class="wrapper-imagem"><img src="imagens/conforto.jpg" alt="Recado de Conforto"></div>
                   </a>
                </div>

                <!-- Opção 2: Respiração -->
                <div class="card-opcao" id="card-respiracao">
                    <a href="respiracao.html" class="card-opcao link-direto">
                    <span class="rotulo-opcao">Respiração de 1 minuto</span>
                    <div class="wrapper-imagem"><img src="imagens/respiracao.jpg" alt="Exercício de Respiração"></div>
                    </a>
                </div>

                <!-- Opção 3: Sons Suaves -->
                <!-- Vinculado diretamente ao arquivo de playlists que criamos antes! -->
                <a href="playlists.html" class="card-opcao link-direto">
                    <span class="rotulo-opcao">Ouvir sons relaxantes</span>
                    <div class="wrapper-imagem"><img src="imagens/playlists.jpg" alt="Playlists"></div>
                </a>
            </div>
        </div>
    </section>

</body>
</html>
